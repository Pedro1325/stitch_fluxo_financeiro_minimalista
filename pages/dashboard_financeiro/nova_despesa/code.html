<!DOCTYPE html>

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        /* Custom scrollbar for categories dropdown */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 3px; }
        
        /* Segmented Control Animation */
        .toggle-active {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- Top Navigation (Shell suppressed for Task-Focused screen but Header retained for Identity) -->
<header class="bg-surface docked-top w-full border-b border-outline-variant">
<div class="flex justify-between items-center px-lg py-md max-w-container-max mx-auto">
<div class="flex items-center gap-md">
<button class="hover:bg-surface-container-low p-xs rounded-full transition-colors cursor-pointer active:opacity-80">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">New Expense</h1>
</div>
<div class="flex items-center gap-sm">
<span class="text-on-surface-variant font-label-caps text-label-caps hidden md:block">SAVING TO BUSINESS</span>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A professional close-up headshot of a person with a friendly expression, set against a clean, neutral studio background with soft cinematic lighting. The style is modern and high-quality, reflecting a corporate yet approachable aesthetic consistent with a financial application's user profile photo." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvv57fNcpu90XB-SbayQI-RKaV4_FJAqox5RV5n8isKc-Kcz6pRueS-jJIzHY1FSpiOTI68HDb3IatKRt7q2xe8bxZgUFGETeNbjbj3T9AF6hPCGt88P5Nl2NcJr7JL_Lu7QFVnanagkrh1ROn4OpZAgIcCJ_P_8SukPxPPQA_7hf4jboUstu7k8YJzOKuZZ6H8zxTW9sm3In9QFcgz8fRRnw7xWIF3MSomtcOqlcitDJlvU-BhYSoLQ154pb9Y5lh43RSqQKN0es"/>
</div>
</div>
</div>
</header>
<main class="max-w-[640px] mx-auto px-md py-xl">
<!-- Segmented Toggle -->
<div class="mb-xl">
<div class="bg-surface-container-low p-base rounded-full flex relative isolate">
<div class="absolute inset-y-base left-base w-[calc(50%-4px)] bg-surface rounded-full shadow-sm border border-outline-variant z-0 toggle-active" id="toggle-indicator"></div>
<button class="flex-1 py-sm font-label-caps text-label-caps text-center z-10 transition-colors text-primary" id="toggle-personal" onclick="updateToggle(0)">Personal</button>
<button class="flex-1 py-sm font-label-caps text-label-caps text-center z-10 transition-colors text-on-surface-variant" id="toggle-business" onclick="updateToggle(1)">Business</button>
</div>
</div>
<form class="space-y-xl">
<!-- Amount Input (Prominent) -->
<div class="text-center py-xl bg-surface border border-outline-variant rounded-xl">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs">VALUE</label>
<div class="flex items-center justify-center">
<span class="font-display-lg text-display-lg text-on-surface-variant mr-xs">$</span>
<input autofocus="" class="bg-transparent border-none focus:ring-0 font-display-lg text-display-lg text-primary w-48 text-center placeholder-surface-dim" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Description -->
<div class="space-y-xs">
<label class="block font-title-sm text-title-sm text-on-surface">Description</label>
<input class="w-full px-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all bg-surface placeholder-on-surface-variant/40" placeholder="What was this for?" type="text"/>
</div>
<!-- Grid Layout for Category and Date -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Category Dropdown -->
<div class="space-y-xs relative">
<label class="block font-title-sm text-title-sm text-on-surface">Category</label>
<div class="relative">
<select class="w-full px-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all bg-surface appearance-none">
<option value="">Select Category</option>
<option value="food">Food &amp; Dining</option>
<option value="travel">Travel &amp; Transport</option>
<option value="software">Software &amp; Subs</option>
<option value="office">Office Supplies</option>
<option value="marketing">Marketing</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">keyboard_arrow_down</span>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-xs">
<label class="block font-title-sm text-title-sm text-on-surface">Date</label>
<div class="relative">
<input class="w-full px-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all bg-surface" type="date"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">calendar_today</span>
</div>
</div>
</div>
<!-- Observations -->
<div class="space-y-xs">
<label class="block font-title-sm text-title-sm text-on-surface">Observations</label>
<textarea class="w-full px-md py-sm rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all bg-surface placeholder-on-surface-variant/40 resize-none" placeholder="Additional notes or context..." rows="4"></textarea>
</div>
<!-- Attachment Section (Optional visual polish) -->
<div class="border-2 border-dashed border-outline-variant rounded-xl p-xl flex flex-col items-center justify-center bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-[32px] mb-xs">attachment</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Attach receipt or invoice (Optional)</p>
</div>
</form>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-lg z-50">
<div class="max-w-[640px] mx-auto">
<button class="w-full bg-primary text-on-primary py-md rounded-xl font-title-sm text-title-sm hover:bg-primary-container transition-all active:scale-[0.98] shadow-sm">
                Save Expense
            </button>
</div>
</div>
<!-- Bottom Navigation Spacer (Mobile only) -->
<div class="h-20 md:hidden"></div>
<script>
        function updateToggle(index) {
            const indicator = document.getElementById('toggle-indicator');
            const personalBtn = document.getElementById('toggle-personal');
            const businessBtn = document.getElementById('toggle-business');
            
            if (index === 0) {
                indicator.style.transform = 'translateX(0)';
                personalBtn.classList.add('text-primary');
                personalBtn.classList.remove('text-on-surface-variant');
                businessBtn.classList.add('text-on-surface-variant');
                businessBtn.classList.remove('text-primary');
            } else {
                indicator.style.transform = 'translateX(100%)';
                businessBtn.classList.add('text-primary');
                businessBtn.classList.remove('text-on-surface-variant');
                personalBtn.classList.add('text-on-surface-variant');
                personalBtn.classList.remove('text-primary');
            }
        }

        // Initialize date to today
        document.querySelector('input[type="date"]').valueAsDate = new Date();
    </script>
</body></html>
